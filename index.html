<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finest Aquatics Staff Hub Premium</title>

<style>
:root{
  --bg:#000;
  --card:#111;
  --line:#2a2a2a;
  --orange:#ff5a00;
  --orangeSoft:#ff7a1a;
  --text:#fff;
  --muted:#aaa;
  --green:#55ff88;
}

body{
  background:#000;
  color:var(--text);
  font-family:system-ui;
  margin:0;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.brand{
  font-size:22px;
  font-weight:900;
}

.tag{
  font-size:12px;
  color:var(--orange);
}

/* STATS BAR */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.stat{
  background:#111;
  padding:15px;
  border-radius:15px;
  text-align:center;
  border:1px solid #222;
}

.stat b{
  display:block;
  font-size:20px;
}

.stat span{
  color:#aaa;
  font-size:12px;
}

/* CARDS */
.card{
  background:#111;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  border:1px solid #222;
}

/* BUTTONS */
button{
  padding:15px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:700;
}

.primary{
  background:linear-gradient(90deg,var(--orange),var(--orangeSoft));
  color:#fff;
}

input{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#050505;
  color:#fff;
}

/* TASK */
.task{
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.done{
  color:var(--green);
}

</style>
</head>

<body>

<div id="login">
<div class="card">
<h2>Login</h2>
<input id="pin" placeholder="Enter PIN">
<button class="primary" onclick="login()">Login</button>
</div>
</div>

<div id="manager" style="display:none">

<div class="header">
<div class="brand">Finest Aquatics</div>
<div class="tag">Manager Panel</div>
</div>

<div class="stats">
<div class="stat"><b id="statStaff">0</b><span>Staff In</span></div>
<div class="stat"><b id="statTasks">0</b><span>Tasks</span></div>
<div class="stat"><b id="statProblems">0</b><span>Problems</span></div>
<div class="stat"><b id="statAlerts">0</b><span>Alerts</span></div>
</div>

<div class="card">
<h3>Give Task</h3>
<input id="taskInput" placeholder="Task">
<button class="primary" onclick="addTask()">Add Task</button>
</div>

<div class="card">
<h3>Tasks</h3>
<div id="tasks"></div>
</div>

<div class="card">
<h3>Activity</h3>
<div id="activity"></div>
</div>

</div>

<script>
let data={
tasks:[],
activity:[],
clocked:[],
problems:[]
};

function login(){
document.getElementById("login").style.display="none";
document.getElementById("manager").style.display="block";
render();
}

function addTask(){
let t=document.getElementById("taskInput").value;
if(!t)return;

data.tasks.push({text:t,done:false});
data.activity.unshift("Task added: "+t);

render();
}

function render(){
document.getElementById("statTasks").innerText=data.tasks.length;
document.getElementById("statStaff").innerText=data.clocked.length;
document.getElementById("statProblems").innerText=data.problems.length;
document.getElementById("statAlerts").innerText=data.activity.length;

let t="";
data.tasks.forEach((task,i)=>{
t+=`<div class="task">${task.text} 
<button onclick="done(${i})">Done</button></div>`;
});
document.getElementById("tasks").innerHTML=t;

let a="";
data.activity.forEach(log=>{
a+=`<div class="task">${log}</div>`;
});
document.getElementById("activity").innerHTML=a;
}

function done(i){
data.tasks[i].done=true;
data.activity.unshift("Task completed: "+data.tasks[i].text);
render();
}
</script>

</body>
</html>
