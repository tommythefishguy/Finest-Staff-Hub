<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Staff Hub Core</title>
<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px}
input,select{padding:12px;border-radius:8px;border:none;margin:5px 0;width:90%;max-width:420px}
button{padding:15px;margin:5px;border:none;border-radius:10px;font-size:16px}
.primary{background:orange;color:#fff}
.box{background:#111;padding:15px;border-radius:10px;margin:10px 0}
.task{background:#222;padding:10px;border-radius:8px;margin:8px 0}
.small{color:#aaa;font-size:13px}
.done{color:#55ff88}
.warn{color:orange}
.log{border-left:4px solid orange;padding:8px 10px;background:#1b1b1b;margin:8px 0;border-radius:8px}
</style>
</head>
<body>

<div id="login">
<h2>Login</h2>
<input id="pin" placeholder="PIN"><br><br>
<button class="primary" onclick="login()">Login</button>
<p>Staff PIN: 1234</p>
<p>Manager PIN: 9999</p>
</div>

<div id="staff" style="display:none">
<h2 id="name"></h2>

<button onclick="clock()" id="clockBtn">Clock In</button>

<div class="box">
<h3>My Tasks Today</h3>
<div id="tasks"></div>
</div>

<button onclick="report()">Report Problem</button>

<br><br>
<button onclick="showLogin()">Manager Login</button>
</div>

<div id="manager" style="display:none">
<h2>Manager</h2>

<div class="box">
<h3>Give Task</h3>
<label>Assign to</label><br>
<select id="taskStaff"></select><br>

<input id="taskInput" placeholder="Task"><br>
<input id="taskLocation" placeholder="Location / tank (optional)"><br>

<label>Repeat</label><br>
<select id="taskRepeat">
<option>One-off</option>
<option>Daily</option>
<option>Weekly</option>
</select><br>

<select id="taskPriority">
<option>Normal</option>
<option>Important</option>
<option>Urgent</option>
</select><br><br>

<button class="primary" onclick="addTask()">Give Task</button>
</div>

<div class="box">
<h3>Default Daily Checks</h3>
<button onclick="addDefaultChecks()">Add Skimmer + Water Level Checks</button>
<p class="small">Adds daily tasks for all staff: Check skimmer and Check water levels.</p>
</div>

<div class="box">
<h3>Staff Clocked In</h3>
<div id="clocked"></div>
</div>

<div class="box">
<h3>Tasks</h3>
<div id="allTasks"></div>
</div>

<div class="box">
<h3>Problems</h3>
<div id="problems"></div>
</div>

<div class="box">
<h3>Activity Log</h3>
<button onclick="clearLogs()">Clear Activity Logs</button>
<div id="activityLog"></div>
</div>

<div class="box">
<h3>Add Staff</h3>
<input id="newStaffName" placeholder="Name"><br>
<input id="newStaffPin" placeholder="PIN"><br>
<select id="newStaffRole">
<option value="staff">Staff</option>
<option value="manager">Manager</option>
</select><br>
<button onclick="addStaff()">Add Staff</button>
<div id="staffList"></div>
</div>

<button onclick="showLogin()">Back to Login</button>
<button onclick="logout()">Refresh App</button>
</div>

<script>
let user=null;

let data={
staff:[
{name:"Staff",pin:"1234",role:"staff"},
{name:"Manager",pin:"9999",role:"manager"}
],
tasks:[],
clocked:[],
problems:[],
activity:[]
};

function today(){
return new Date().toISOString().slice(0,10);
}

function timeNow(){
return new Date().toLocaleString();
}

function addActivity(text,type){
data.activity.unshift({
text:text,
type:type || "general",
time:timeNow()
});
renderActivity();
}

function weekKey(){
let d=new Date();
let onejan=new Date(d.getFullYear(),0,1);
let week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
return d.getFullYear()+"-W"+week;
}

function hideAll(){
document.getElementById("login").style.display="none";
document.getElementById("staff").style.display="none";
document.getElementById("manager").style.display="none";
}

function showLogin(){
user=null;
hideAll();
document.getElementById("pin").value="";
document.getElementById("login").style.display="block";
}

function login(){
let pin=document.getElementById("pin").value;
let found=data.staff.find(s=>s.pin==pin);
if(!found)return alert("Wrong PIN");

user=found;
hideAll();

if(found.role=="manager"){
document.getElementById("manager").style.display="block";
addActivity(found.name+" logged into manager area","login");
renderManager();
}else{
document.getElementById("staff").style.display="block";
document.getElementById("name").innerText=found.name;
addActivity(found.name+" logged in","login");
renderTasks();
renderClockButton();
}
}

function renderClockButton(){
let btn=document.getElementById("clockBtn");
let isIn=data.clocked.includes(user.name);
btn.innerText=isIn ? "Clock Out" : "Clock In";
}

function clock(){
let isIn=data.clocked.includes(user.name);

if(isIn){
data.clocked=data.clocked.filter(n=>n!==user.name);
addActivity(user.name+" clocked out","clock");
}else{
data.clocked.push(user.name);
addActivity(user.name+" clocked in","clock");
}

renderClockButton();
renderManager();
}

function populateTaskStaff(){
let select=document.getElementById("taskStaff");
select.innerHTML="<option>All Staff</option>";
data.staff.forEach(s=>{
select.innerHTML += `<option>${s.name}</option>`;
});
}

function isTaskDoneForPeriod(t){
if(t.repeat==="Daily"){
return t.completedDates && t.completedDates.includes(today());
}
if(t.repeat==="Weekly"){
return t.completedWeeks && t.completedWeeks.includes(weekKey());
}
return t.done;
}

function shouldShowTask(t){
if(t.repeat==="Daily") return true;
if(t.repeat==="Weekly") return true;
return !t.done;
}

function addTask(){
let assigned=document.getElementById("taskStaff").value;
let t=document.getElementById("taskInput").value;
let loc=document.getElementById("taskLocation").value;
let priority=document.getElementById("taskPriority").value;
let repeat=document.getElementById("taskRepeat").value;

if(!t)return alert("Add a task first");

data.tasks.push({
text:t,
assignedTo:assigned,
location:loc,
priority:priority,
repeat:repeat,
done:false,
completedBy:"",
completedAt:"",
completedDates:[],
completedWeeks:[],
createdBy:user.name,
createdAt:timeNow()
});

addActivity(user.name+" assigned task '"+t+"' to "+assigned,"task");

document.getElementById("taskInput").value="";
document.getElementById("taskLocation").value="";
document.getElementById("taskPriority").value="Normal";
document.getElementById("taskRepeat").value="One-off";

renderManager();
renderTasks();
}

function addDefaultChecks(){
let existsSkimmer=data.tasks.some(t=>t.text==="Check skimmer" && t.repeat==="Daily");
let existsWater=data.tasks.some(t=>t.text==="Check water levels" && t.repeat==="Daily");

if(!existsSkimmer){
data.tasks.push({
text:"Check skimmer",
assignedTo:"All Staff",
location:"Sump / skimmer area",
priority:"Important",
repeat:"Daily",
done:false,
completedBy:"",
completedAt:"",
completedDates:[],
completedWeeks:[],
createdBy:user.name,
createdAt:timeNow()
});
addActivity(user.name+" added daily task 'Check skimmer'","task");
}

if(!existsWater){
data.tasks.push({
text:"Check water levels",
assignedTo:"All Staff",
location:"All tanks / sumps",
priority:"Important",
repeat:"Daily",
done:false,
completedBy:"",
completedAt:"",
completedDates:[],
completedWeeks:[],
createdBy:user.name,
createdAt:timeNow()
});
addActivity(user.name+" added daily task 'Check water levels'","task");
}

renderManager();
alert("Default daily checks added");
}

function renderTasks(){
let el=document.getElementById("tasks");
if(!user)return;

let mine=data.tasks.filter(t=>{
return shouldShowTask(t) && !isTaskDoneForPeriod(t) && (t.assignedTo==="All Staff" || t.assignedTo===user.name);
});

el.innerHTML="";
mine.forEach((t)=>{
let realIndex=data.tasks.indexOf(t);
el.innerHTML+=`
<div class="task">
<b>${t.text}</b><br>
<span class="small">${t.priority} • ${t.repeat} ${t.location? "• " + t.location : ""}</span><br>
<button onclick="done(${realIndex})">Done</button>
</div>`;
});

if(el.innerHTML==="") el.innerHTML="No tasks yet";
}

function done(i){
let t=data.tasks[i];

if(t.repeat==="Daily"){
if(!t.completedDates)t.completedDates=[];
if(!t.completedDates.includes(today())) t.completedDates.push(today());
}
else if(t.repeat==="Weekly"){
if(!t.completedWeeks)t.completedWeeks=[];
if(!t.completedWeeks.includes(weekKey())) t.completedWeeks.push(weekKey());
}
else{
t.done=true;
}

t.completedBy=user.name;
t.completedAt=timeNow();

addActivity(user.name+" completed task '"+t.text+"'","complete");

renderTasks();
renderManager();
}

function report(){
let p=prompt("Problem?");
if(!p)return;
data.problems.push(user.name + ": " + p);
addActivity(user.name+" reported problem: "+p,"problem");
renderManager();
}

function renderManager(){
populateTaskStaff();

document.getElementById("clocked").innerText=data.clocked.join(", ")||"None";

document.getElementById("allTasks").innerHTML =
data.tasks.length ? data.tasks.map((t,i)=>{
let doneNow=isTaskDoneForPeriod(t);
let status=doneNow ? `<span class="done">✔ Done by ${t.completedBy || "staff"} ${t.completedAt? "at " + t.completedAt : ""}</span>` : `<span class="warn">Pending</span>`;

return `
<div class="task">
<b>${t.text}</b><br>
<span class="small">Assigned to: ${t.assignedTo} • ${t.priority} • ${t.repeat} ${t.location? "• " + t.location : ""}</span><br>
${status}<br>
${!doneNow ? `<button onclick="managerDone(${i})">Mark Done</button>` : ""}
<button onclick="deleteTask(${i})">Delete</button>
</div>`;
}).join("") : "No tasks";

document.getElementById("problems").innerHTML=
data.problems.length ? data.problems.join("<br>") : "None";

renderStaffList();
renderActivity();
}

function managerDone(i){
let t=data.tasks[i];

if(t.repeat==="Daily"){
if(!t.completedDates)t.completedDates=[];
if(!t.completedDates.includes(today())) t.completedDates.push(today());
}
else if(t.repeat==="Weekly"){
if(!t.completedWeeks)t.completedWeeks=[];
if(!t.completedWeeks.includes(weekKey())) t.completedWeeks.push(weekKey());
}
else{
t.done=true;
}

t.completedBy=user.name;
t.completedAt=timeNow();

addActivity(user.name+" marked task '"+t.text+"' as done","complete");

renderManager();
}

function deleteTask(i){
let taskName=data.tasks[i].text;
data.tasks.splice(i,1);
addActivity(user.name+" deleted task '"+taskName+"'","delete");
renderManager();
}

function addStaff(){
let name=document.getElementById("newStaffName").value;
let pin=document.getElementById("newStaffPin").value;
let role=document.getElementById("newStaffRole").value;

if(!name || !pin)return alert("Name and PIN needed");
if(data.staff.some(s=>s.pin==pin))return alert("PIN already used");

data.staff.push({name:name,pin:pin,role:role});

addActivity(user.name+" added staff member "+name,"staff");

document.getElementById("newStaffName").value="";
document.getElementById("newStaffPin").value="";

renderManager();
}

function renderStaffList(){
let el=document.getElementById("staffList");
el.innerHTML=data.staff.map((s,i)=>{
return `<div class="task">${s.name} - ${s.role} - PIN ${s.pin} ${s.pin!="9999" ? `<button onclick="deleteStaff(${i})">Delete</button>` : ""}</div>`;
}).join("");
}

function deleteStaff(i){
let name=data.staff[i].name;
data.staff.splice(i,1);
addActivity(user.name+" deleted staff member "+name,"staff");
renderManager();
}

function renderActivity(){
let el=document.getElementById("activityLog");
if(!el)return;

el.innerHTML=data.activity.length ? data.activity.slice(0,30).map(a=>{
return `<div class="log"><b>${a.time}</b><br>${a.text}</div>`;
}).join("") : "No activity yet";
}

function clearLogs(){
if(!confirm("Clear activity logs?"))return;
data.activity=[];
renderActivity();
}

function logout(){
location.reload();
}
</script>

</body>
</html>
